# Jupyter Book Configuration
title: diive Documentation
author: Lukas Hörtnagl
logo: null

# Build settings
format: jb-book
root_doc: intro

# Sphinx extensions
sphinx:
  extra_extensions:
    - sphinx.ext.autodoc
    - sphinx.ext.autosummary
    - sphinx.ext.napoleon
    - sphinx_autodoc_typehints

# MyST Markdown parsing
myst:
  enable_extensions:
    - colon_fence
    - dollarmath
    - linkify

# Execution
execute:
  execute_notebooks: "off"

# Output
html:
  use_issues_button: true
  use_repository_button: true
